<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 經典版 - 優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap');

        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Nunito', sans-serif;
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            width: 340px;
            height: 340px;
            position: relative;
            background-color: var(--grid-bg);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            user-select: none;
        }

        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border-radius: 4px;
        }

        .tile-container {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: 69px;
            height: 69px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            transition: transform 120ms ease-in-out;
            z-index: 1;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: appear 200ms ease-out;
        }

        /* 數字配色優化 */
        .tile-2 .tile-inner { background: #eee4da; color: #776e65; }
        .tile-4 .tile-inner { background: #ede0c8; color: #776e65; }
        .tile-8 .tile-inner { background: #f2b179; color: #f9f6f2; }
        .tile-16 .tile-inner { background: #f59563; color: #f9f6f2; }
        .tile-32 .tile-inner { background: #f67c5f; color: #f9f6f2; }
        .tile-64 .tile-inner { background: #f65e3b; color: #f9f6f2; }
        .tile-128 .tile-inner { background: #edcf72; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 10px rgba(237, 207, 114, 0.4); }
        .tile-256 .tile-inner { background: #edcc61; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 15px rgba(237, 204, 97, 0.5); }
        .tile-512 .tile-inner { background: #edc850; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 20px rgba(237, 200, 80, 0.6); }
        .tile-1024 .tile-inner { background: #edc53f; color: #f9f6f2; font-size: 22px; }
        .tile-2048 .tile-inner { background: #edc22e; color: #f9f6f2; font-size: 22px; }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tile-merged .tile-inner {
            animation: pop 200ms ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.8);
            border-radius: 8px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 400ms ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn {
            background: #8f7a66;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 800;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #7f6a56;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7f6a56;
        }
    </style>
</head>
<body>

    <div class="flex flex-col items-center w-full max-w-md px-4">
        <div class="flex justify-between items-center w-full mb-6 mt-4">
            <h1 class="text-5xl font-extrabold tracking-tight text-[#776e65]">2048</h1>
            <div class="flex gap-2">
                <div class="bg-[#bbada0] px-4 py-2 rounded text-center min-w-[85px]">
                    <div class="text-[#eee4da] text-[10px] font-bold uppercase leading-tight">SCORE</div>
                    <div id="score" class="text-white text-xl font-extrabold">0</div>
                </div>
                <div class="bg-[#bbada0] px-4 py-2 rounded text-center min-w-[85px]">
                    <div class="text-[#eee4da] text-[10px] font-bold uppercase leading-tight">BEST</div>
                    <div id="best-score" class="text-white text-xl font-extrabold">0</div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full mb-6">
            <div>
                <p class="text-[#776e65] font-semibold">合併方塊來獲得 <span class="text-black">2048</span></p>
            </div>
            <button onclick="game.restart()" class="btn">新遊戲</button>
        </div>

        <div class="game-container" id="game-container">
            <div class="grid-background">
                <!-- 16個背景格子 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <div id="tile-container" class="tile-container"></div>
            
            <div id="game-over" class="overlay">
                <h2 class="text-4xl font-extrabold text-[#776e65] mb-6">遊戲結束！</h2>
                <button onclick="game.restart()" class="btn">再試一次</button>
            </div>

            <div id="game-win" class="overlay">
                <h2 class="text-4xl font-extrabold text-[#edc22e] mb-6">你贏了！</h2>
                <button onclick="game.continuePlaying()" class="btn">繼續挑戰</button>
            </div>
        </div>

        <p class="mt-10 text-sm text-[#776e65] leading-relaxed text-center">
            <strong>玩法提示：</strong> 使用鍵盤 <strong>方向鍵</strong> 或 <strong>滑動螢幕</strong><br>
            讓相同的數字合併在一起！
        </p>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.gridSize = 4;
                this.container = document.getElementById('tile-container');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.gameOverOverlay = document.getElementById('game-over');
                this.gameWinOverlay = document.getElementById('game-win');
                
                this.bestScore = localStorage.getItem('2048-best-v2') || 0;
                this.bestScoreElement.textContent = this.bestScore;
                
                this.init();
            }

            init() {
                this.board = Array(this.gridSize).fill().map(() => Array(this.gridSize).fill(null));
                this.score = 0;
                this.over = false;
                this.won = false;
                this.keepPlaying = false;
                
                this.scoreElement.textContent = 0;
                this.gameOverOverlay.style.display = 'none';
                this.gameWinOverlay.style.display = 'none';
                this.container.innerHTML = '';

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            restart() {
                this.init();
            }

            continuePlaying() {
                this.keepPlaying = true;
                this.gameWinOverlay.style.display = 'none';
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.board[r][c]) emptyCells.push({r, c});
                    }
                }
                if (emptyCells.length > 0) {
                    const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.board[r][c] = {
                        value: Math.random() < 0.9 ? 2 : 4,
                        r, c,
                        mergedFrom: null,
                        id: Math.random().toString(36).substr(2, 9)
                    };
                }
            }

            // 渲染邏輯優化：使用 translate 達成平滑移動
            render() {
                const currentTileIds = new Set();
                
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        const tile = this.board[r][c];
                        if (tile) {
                            if (tile.mergedFrom) {
                                // 處理合併動畫
                                tile.mergedFrom.forEach(t => this.renderTile(t, true));
                                this.renderTile(tile);
                            } else {
                                this.renderTile(tile);
                            }
                            currentTileIds.add(tile.id);
                        }
                    }
                }

                // 移除不在董事會上的 DOM
                const allDoms = this.container.querySelectorAll('.tile');
                allDoms.forEach(dom => {
                    if (!currentTileIds.has(dom.dataset.id)) {
                        dom.remove();
                    }
                });

                this.scoreElement.textContent = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreElement.textContent = this.bestScore;
                    localStorage.setItem('2048-best-v2', this.bestScore);
                }
            }

            renderTile(tile, isOldMerged = false) {
                let element = document.querySelector(`[data-id="${tile.id}"]`);
                const x = tile.c * (69 + 12);
                const y = tile.r * (69 + 12);

                if (!element) {
                    element = document.createElement('div');
                    element.className = `tile tile-${tile.value}`;
                    element.dataset.id = tile.id;
                    element.innerHTML = `<div class="tile-inner">${tile.value}</div>`;
                    this.container.appendChild(element);
                } else {
                    // 更新值與類別（處理合併後的數字變化）
                    element.className = `tile tile-${tile.value} ${tile.merged ? 'tile-merged' : ''}`;
                    element.querySelector('.tile-inner').textContent = tile.value;
                }

                element.style.transform = `translate(${x}px, ${y}px)`;
                
                if (isOldMerged) {
                    setTimeout(() => element.remove(), 100);
                }
            }

            move(direction) {
                if (this.over) return;

                let moved = false;
                const size = this.gridSize;

                // 清除之前的合併標記
                this.board.forEach(row => row.forEach(tile => {
                    if (tile) {
                        tile.merged = false;
                        tile.mergedFrom = null;
                    }
                }));

                const vectors = [
                    {x: 0, y: -1}, // Up
                    {x: 1, y: 0},  // Right
                    {x: 0, y: 1},  // Down
                    {x: -1, y: 0}  // Left
                ];
                const vector = vectors[direction];
                
                // 決定遍歷順序
                const traversalsX = direction === 1 ? [3, 2, 1, 0] : [0, 1, 2, 3];
                const traversalsY = direction === 2 ? [3, 2, 1, 0] : [0, 1, 2, 3];

                traversalsY.forEach(r => {
                    traversalsX.forEach(c => {
                        const tile = this.board[r][c];
                        if (tile) {
                            const farthest = this.findFarthestPosition(r, c, vector);
                            const next = this.getNextTile(farthest, vector);

                            if (next && next.value === tile.value && !next.merged) {
                                // 合併
                                const merged = {
                                    value: tile.value * 2,
                                    r: next.r,
                                    c: next.c,
                                    merged: true,
                                    mergedFrom: [tile, next],
                                    id: Math.random().toString(36).substr(2, 9)
                                };

                                this.board[merged.r][merged.c] = merged;
                                this.board[r][c] = null;
                                this.score += merged.value;
                                if (merged.value === 2048) this.won = true;
                                moved = true;
                            } else if (farthest.r !== r || farthest.c !== c) {
                                // 移動到最遠空位
                                this.board[farthest.r][farthest.c] = tile;
                                this.board[r][c] = null;
                                tile.r = farthest.r;
                                tile.c = farthest.c;
                                moved = true;
                            }
                        }
                    });
                });

                if (moved) {
                    this.addRandomTile();
                    this.render();
                    
                    if (this.won && !this.keepPlaying) {
                        this.gameWinOverlay.style.display = 'flex';
                    }
                    
                    if (!this.canMove()) {
                        this.over = true;
                        this.gameOverOverlay.style.display = 'flex';
                    }
                }
            }

            findFarthestPosition(r, c, vector) {
                let previous;
                do {
                    previous = {r, c};
                    r += vector.y;
                    c += vector.x;
                } while (this.withinBounds(r, c) && !this.board[r][c]);

                return previous;
            }

            getNextTile(pos, vector) {
                const r = pos.r + vector.y;
                const c = pos.c + vector.x;
                return this.withinBounds(r, c) ? this.board[r][c] : null;
            }

            withinBounds(r, c) {
                return r >= 0 && r < this.gridSize && c >= 0 && c < this.gridSize;
            }

            canMove() {
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.board[r][c]) return true;
                        const tile = this.board[r][c];
                        const vectors = [{x:1, y:0}, {x:0, y:1}];
                        for (let v of vectors) {
                            const nr = r + v.y, nc = c + v.x;
                            if (this.withinBounds(nr, nc)) {
                                const other = this.board[nr][nc];
                                if (other && other.value === tile.value) return true;
                            }
                        }
                    }
                }
                return false;
            }
        }

        const game = new Game2048();

        window.addEventListener('keydown', e => {
            const map = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3 };
            if (map[e.key] !== undefined) {
                e.preventDefault();
                game.move(map[e.key]);
            }
        });

        let tsX, tsY;
        document.addEventListener('touchstart', e => {
            tsX = e.touches[0].clientX;
            tsY = e.touches[0].clientY;
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if (!tsX || !tsY) return;
            const dx = e.changedTouches[0].clientX - tsX;
            const dy = e.changedTouches[0].clientY - tsY;
            if (Math.max(Math.abs(dx), Math.abs(dy)) > 20) {
                if (Math.abs(dx) > Math.abs(dy)) game.move(dx > 0 ? 1 : 3);
                else game.move(dy > 0 ? 2 : 0);
            }
            tsX = tsY = null;
        }, {passive: false});
    </script>
</body>
</html>
