<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西洋棋終極版 - 修正排版對齊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --board-light: #ebecd0;
            --board-dark: #779556;
            --highlight: rgba(255, 255, 0, 0.5);
            --last-move: rgba(155, 199, 0, 0.4);
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .main-container {
            display: flex;
            flex-direction: row;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        /* 棋盤樣式 - 修正對齊 */
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 600px;
            height: 600px;
            border: 8px solid #334155;
            user-select: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: #334155;
        }

        .square {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; /* 讓棋子以此為基準定位 */
            cursor: pointer;
        }

        .square.light { background-color: var(--board-light); }
        .square.dark { background-color: var(--board-dark); }
        .square.selected { background-color: #f6f669 !important; }
        .square.last-move { background-color: var(--last-move) !important; }
        
        /* 移動提示點 */
        .square.hint::after {
            content: '';
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }

        /* 棋子樣式 - 確保置中 */
        .piece {
            width: 90%;
            height: 90%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            pointer-events: none; /* 讓點擊穿透到格子 */
            transition: all 0.2s ease;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 側邊欄樣式 */
        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .move-history {
            max-height: 280px;
            overflow-y: auto;
        }

        @media (max-width: 1024px) {
            .main-container { flex-direction: column; align-items: center; }
            .chess-board { width: 90vw; height: 90vw; }
            .sidebar { width: 90vw; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-8">

    <div class="main-container">
        
        <!-- 左側：棋盤 -->
        <div class="flex flex-col items-center">
            <div id="status-bar" class="w-full mb-4 p-4 bg-slate-800 rounded-xl flex justify-between items-center border border-slate-700">
                <div class="flex flex-col">
                    <span id="game-status" class="font-bold text-xl text-blue-400">輪到白方</span>
                    <span id="connection-status" class="text-xs text-slate-400 mt-1">本地模式</span>
                </div>
                <div id="turn-indicator" class="w-4 h-4 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)]"></div>
            </div>

            <div id="board" class="chess-board rounded-sm overflow-hidden">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>

        <!-- 右側：側邊欄 -->
        <div class="sidebar">
            <div class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-5 bg-blue-500 rounded-full"></span> 遊戲設定
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400 uppercase tracking-wider font-semibold">對戰模式</label>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <button onclick="setMode('local')" id="mode-local" class="mode-btn bg-blue-600 text-sm py-2 rounded-lg transition">本地</button>
                            <button onclick="setMode('ai')" id="mode-ai" class="mode-btn bg-slate-700 hover:bg-slate-600 text-sm py-2 rounded-lg transition">AI</button>
                            <button onclick="setMode('p2p')" id="mode-p2p" class="mode-btn bg-slate-700 hover:bg-slate-600 text-sm py-2 rounded-lg transition">P2P</button>
                        </div>
                    </div>

                    <div id="ai-difficulty-container" class="hidden">
                        <label class="text-xs text-slate-400 uppercase tracking-wider font-semibold">AI 難度 (Stockfish)</label>
                        <select id="ai-difficulty" onchange="updateAIDifficulty()" class="w-full mt-2 bg-slate-700 border border-slate-600 rounded-lg p-2 text-sm outline-none focus:border-blue-500">
                            <option value="1">簡單 (新手)</option>
                            <option value="5" selected>中等 (普通玩家)</option>
                            <option value="12">困難 (高手)</option>
                            <option value="18">大師 (職業級)</option>
                        </select>
                    </div>

                    <div id="p2p-panel" class="hidden space-y-3 bg-slate-900/50 p-3 rounded-xl border border-slate-700">
                        <div class="text-sm">您的 ID: <span id="my-id" class="text-green-400 font-mono select-all font-bold">...</span></div>
                        <div class="flex gap-2">
                            <input id="peer-id-input" type="text" placeholder="好友 ID" class="bg-slate-700 border border-slate-600 rounded-lg p-2 flex-1 text-sm outline-none">
                            <button onclick="connectToPeer()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-bold">連線</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="resetGame()" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white border border-red-500/50 py-2 rounded-lg font-bold transition text-sm">重置</button>
                    <button onclick="undoMove()" class="bg-slate-700 hover:bg-slate-600 py-2 rounded-lg font-bold transition text-sm">悔棋</button>
                    <button onclick="flipBoard()" class="col-span-2 bg-indigo-600 hover:bg-indigo-700 py-2 rounded-lg font-bold transition text-sm">旋轉棋盤視角</button>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700 flex-1 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-5 bg-green-500 rounded-full"></span> 歷史棋譜
                </h2>
                <div id="history" class="move-history text-sm font-mono grid grid-cols-2 gap-x-6 gap-y-1">
                    <!-- 棋譜內容 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 升變 Modal -->
    <div id="promotion-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
        <div class="bg-slate-800 p-8 rounded-3xl text-center border border-slate-600">
            <h3 class="text-xl font-bold mb-6">請選擇升變棋子</h3>
            <div class="flex gap-4">
                <button onclick="selectPromotion('q')" class="bg-slate-700 w-16 h-16 rounded-xl hover:bg-blue-600 transition text-4xl flex items-center justify-center">♕</button>
                <button onclick="selectPromotion('r')" class="bg-slate-700 w-16 h-16 rounded-xl hover:bg-blue-600 transition text-4xl flex items-center justify-center">♖</button>
                <button onclick="selectPromotion('b')" class="bg-slate-700 w-16 h-16 rounded-xl hover:bg-blue-600 transition text-4xl flex items-center justify-center">♗</button>
                <button onclick="selectPromotion('n')" class="bg-slate-700 w-16 h-16 rounded-xl hover:bg-blue-600 transition text-4xl flex items-center justify-center">♘</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-2xl transform translate-y-32 transition-transform duration-500 z-[100] font-bold"></div>

    <script>
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('game-status');
        const historyEl = document.getElementById('history');
        const myIdEl = document.getElementById('my-id');
        const connStatusEl = document.getElementById('connection-status');
        
        let selectedSquare = null;
        let boardFlipped = false;
        let mode = 'local'; 
        let myRole = 'w'; 
        let peer = null;
        let conn = null;
        let stockfish = null;
        let stockfishReady = false;
        let aiDepth = 5;
        let promotionPendingMove = null;

        const pieceImages = {
            'wp': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
            'wr': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
            'wn': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'wb': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
            'wq': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
            'wk': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'bp': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'br': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'bn': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'bb': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'bq': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'bk': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg'
        };

        // 初始化棋盤格與棋子渲染 (直接嵌套在格子內)
        function renderBoard() {
            boardEl.innerHTML = '';
            const boardState = game.board(); // 8x8 array
            const moves = selectedSquare ? game.moves({ square: selectedSquare, verbose: true }) : [];
            const history = game.history({ verbose: true });
            const lastMove = history[history.length - 1];

            // 根據是否翻轉來決定渲染順序
            const rows = boardFlipped ? [0, 1, 2, 3, 4, 5, 6, 7] : [7, 6, 5, 4, 3, 2, 1, 0];
            const cols = boardFlipped ? [7, 6, 5, 4, 3, 2, 1, 0] : [0, 1, 2, 3, 4, 5, 6, 7];

            for (let i of rows) {
                for (let j of cols) {
                    const squareName = String.fromCharCode(97 + j) + (i + 1);
                    const piece = boardState[7 - i][j];
                    
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(i + j) % 2 === 0 ? 'dark' : 'light'}`;
                    squareDiv.dataset.square = squareName;
                    
                    // 最後一著標記
                    if (lastMove && (lastMove.from === squareName || lastMove.to === squareName)) {
                        squareDiv.classList.add('last-move');
                    }
                    
                    // 選中標記
                    if (selectedSquare === squareName) {
                        squareDiv.classList.add('selected');
                    }

                    // 移動提示點
                    if (moves.some(m => m.to === squareName)) {
                        squareDiv.classList.add('hint');
                    }

                    // 渲染棋子
                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        pieceDiv.style.backgroundImage = `url(${pieceImages[piece.color + piece.type]})`;
                        squareDiv.appendChild(pieceDiv);
                    }

                    squareDiv.onclick = () => handleSquareClick(squareName);
                    boardEl.appendChild(squareDiv);
                }
            }

            updateStatus();
            updateHistory();
        }

        function handleSquareClick(square) {
            if (mode === 'p2p' && game.turn() !== myRole) return;
            if (mode === 'ai' && game.turn() === 'b') return;

            const piece = game.get(square);

            if (selectedSquare === square) {
                selectedSquare = null;
            } else if (selectedSquare) {
                const move = { from: selectedSquare, to: square };
                const availableMoves = game.moves({ verbose: true });
                const isPromotion = availableMoves.some(m => m.from === selectedSquare && m.to === square && m.flags.includes('p'));

                if (isPromotion) {
                    promotionPendingMove = move;
                    document.getElementById('promotion-modal').classList.remove('hidden');
                    document.getElementById('promotion-modal').classList.add('flex');
                    return;
                }

                const result = game.move(move);
                if (result) {
                    selectedSquare = null;
                    if (mode === 'p2p' && conn) conn.send({ type: 'move', move: move });
                    if (mode === 'ai' && !game.game_over()) setTimeout(triggerAI, 500);
                } else if (piece && piece.color === game.turn()) {
                    selectedSquare = square;
                } else {
                    selectedSquare = null;
                }
            } else {
                if (piece && piece.color === game.turn()) {
                    selectedSquare = square;
                }
            }
            renderBoard();
        }

        function selectPromotion(pieceType) {
            document.getElementById('promotion-modal').classList.add('hidden');
            document.getElementById('promotion-modal').classList.remove('flex');
            if (promotionPendingMove) {
                const move = { ...promotionPendingMove, promotion: pieceType };
                game.move(move);
                if (mode === 'p2p' && conn) conn.send({ type: 'move', move: move });
                promotionPendingMove = null;
                renderBoard();
                if (mode === 'ai' && !game.game_over()) setTimeout(triggerAI, 500);
            }
        }

        function updateStatus() {
            let status = '';
            let isWhite = game.turn() === 'w';
            let moveColor = isWhite ? '白方' : '黑方';
            
            const indicator = document.getElementById('turn-indicator');
            indicator.style.backgroundColor = isWhite ? 'white' : '#334155';
            indicator.style.boxShadow = isWhite ? '0 0 15px rgba(255,255,255,0.8)' : '0 0 15px rgba(0,0,0,0.5)';

            if (game.in_checkmate()) {
                status = `遊戲結束，${moveColor} 被將死！`;
                showToast(status);
            } else if (game.in_draw()) {
                status = '遊戲結束，和局！';
            } else {
                status = `輪到 ${moveColor} 下棋`;
                if (game.in_check()) status += ' (將軍!)';
            }
            statusEl.innerText = status;
            statusEl.className = `font-bold text-xl ${isWhite ? 'text-white' : 'text-slate-400'}`;
        }

        function updateHistory() {
            const history = game.history();
            historyEl.innerHTML = '';
            for (let i = 0; i < history.length; i += 2) {
                const turnNum = Math.floor(i / 2) + 1;
                historyEl.innerHTML += `<div class="text-slate-500">${turnNum}.</div> 
                                        <div class="flex justify-between">
                                            <span class="text-white">${history[i]}</span>
                                            <span class="text-blue-400 ml-2">${history[i+1] || ''}</span>
                                        </div>`;
            }
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.replace('bg-blue-600', 'bg-slate-700'));
            document.getElementById(`mode-${newMode}`).classList.replace('bg-slate-700', 'bg-blue-600');
            document.getElementById('p2p-panel').classList.toggle('hidden', mode !== 'p2p');
            document.getElementById('ai-difficulty-container').classList.toggle('hidden', mode !== 'ai');
            
            if (mode === 'p2p') {
                initPeer();
                connStatusEl.innerText = '等待連線...';
            } else if (mode === 'ai') {
                initAI();
                connStatusEl.innerText = '電腦模式 (Stockfish)';
            } else {
                connStatusEl.innerText = '本地對戰模式';
            }
            resetGame();
        }

        function updateAIDifficulty() {
            aiDepth = parseInt(document.getElementById('ai-difficulty').value);
            showToast(`難度已調整`);
        }

        function resetGame() {
            game.reset();
            selectedSquare = null;
            renderBoard();
        }

        function undoMove() {
            if (mode === 'p2p') return showToast('線上對戰無法悔棋');
            game.undo();
            if (mode === 'ai') game.undo();
            renderBoard();
        }

        function flipBoard() {
            boardFlipped = !boardFlipped;
            renderBoard();
        }

        async function initAI() {
            if (stockfishReady) return;
            try {
                const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
                const scriptText = await response.text();
                const blob = new Blob([scriptText], { type: 'application/javascript' });
                const blobURL = URL.createObjectURL(blob);
                stockfish = new Worker(blobURL);
                stockfish.onmessage = function(e) {
                    if (e.data.startsWith('bestmove')) {
                        const moveStr = e.data.split(' ')[1];
                        game.move({
                            from: moveStr.substring(0, 2),
                            to: moveStr.substring(2, 4),
                            promotion: moveStr.length > 4 ? moveStr[4] : 'q'
                        });
                        renderBoard();
                    }
                };
                stockfishReady = true;
            } catch (err) { console.error(err); }
        }

        function triggerAI() {
            if (!stockfishReady || game.game_over()) return;
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth ' + aiDepth);
        }

        function initPeer() {
            if (peer) return;
            peer = new Peer();
            peer.on('open', (id) => { myIdEl.innerText = id; });
            peer.on('connection', (connection) => {
                conn = connection;
                myRole = 'b';
                boardFlipped = true;
                setupConnListeners();
                connStatusEl.innerText = '已連線 - 您執黑';
                resetGame();
            });
        }

        function connectToPeer() {
            const peerId = document.getElementById('peer-id-input').value;
            if (!peerId) return;
            conn = peer.connect(peerId);
            myRole = 'w';
            boardFlipped = false;
            setupConnListeners();
            connStatusEl.innerText = '已連線 - 您執白';
            resetGame();
        }

        function setupConnListeners() {
            conn.on('data', (data) => {
                if (data.type === 'move') {
                    game.move(data.move);
                    renderBoard();
                }
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }

        renderBoard();
    </script>
</body>
</html>
